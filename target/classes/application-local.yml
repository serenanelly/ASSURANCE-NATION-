# Profil local : H2 en mémoire, sans PostgreSQL (idéal pour Swagger / dev rapide)
spring:
  datasource:
    url: jdbc:h2:mem:assurance_nation;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
