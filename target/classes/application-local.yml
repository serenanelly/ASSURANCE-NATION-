# Profil local : H2 sur fichier (données persistées entre les redémarrages), sans PostgreSQL.
# Le fichier est créé dans ./data/assurance_nation.mv.db (relatif au dossier du backend).
spring:
  datasource:
    url: jdbc:h2:file:./data/assurance_nation;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
